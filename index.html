<!DOCTYPE html>
<html lang="en">
<head>
  <title>Skidy Jay Store</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">
      <a href="cart.html" class="btn btn-warning ms-3 align-item-center ">
        <i class="bi bi-cart"></i>
        cart <span class="badge bg-dark cartquantity-js">0</span>
      
      </a>
      <a href="" class="navbar-brand ms-3 align-item-center">
        <span class="fw-bold fs-4 ">Skidy Jay Store</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end gap-5" id="navbarContent">
        <ul class="navbar-nav gap-3 ">
          <li class="nav-item">
            <a class="nav-link active" href="">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="">Products</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="">contact</a>
          </li>
        </ul>
        <a href="" class="">
          <i class="bi bi-cart-fill text-warning fs-3 me-4"></i>
          <li class="nav-item">
            <a class="nav-link active btn btn-warning px-3 py-1 align-item-center fw-bold" href="">Login</a>
          </li>
        </a>
      </div>
    </div>
   
  </nav>

  <div class="container mt-4 container-cs ">
    <div class="row  js-cont">
     <div class="col-11 col-sm-5 col-md-3 mb-4">
        <div class="card m-0">
          <img src="image1.jpg" alt="Product" class="card-img-top p-3 w-100">
          <div class="card-body">
            <h6>${element.title}</h6>
            <p>$${element.price}</p>
            <button class="btn btn-warning w-100">Add to Cart</button>
          </div>
        </div>
     </div>
    
    
     <div class="col-11 col-sm-5 col-md-3 mb-4 w">
        <div class="card m-0">
          <img src="image1.jpg" alt="Product" class="card-img-top p-3 img-p">
          <div class="card-body">
            <h6>${element.title}</h6>
            <p>$${element.price}</p>
            <button class="btn btn-warning w-100">Add to Cart</button>
          </div>
        </div>
     </div>
  </div>
  
  </div>
  
  
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
 <script type="module" src="store.js"></script>
</html>
